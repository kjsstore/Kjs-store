    let full = Math.floor(rating);
    let half = rating % 1 !== 0;
    let stars = '';
    for(let i=0; i<full; i++) stars += '★';
    if(half) stars += '½';
    while(stars.length < 5) stars += '☆';
    return stars;
  }

  function formatDownload(count) {
    if(typeof count === 'string') return count;
    if(count >= 1000) return (count/1000).toFixed(1) + 'k';
    return count;
  }

  // Format teks modal menjadi HTML yang rapi
  function formatModalText(text) {
    let formatted = text
      .replace(/\n/g, '<br>')
      .replace(/✅/g, '<span style="color:#06b6d4;">✅</span>')
      .replace(/✔/g, '<span style="color:#facc15;">✔</span>')
      .replace(/⚠️/g, '<span style="color:#f97316;">⚠️</span>')
      .replace(/🔥/g, '<span style="color:#facc15;">🔥</span>')
      .replace(/✨/g, '<span style="color:#facc15;">✨</span>')
      .replace(/🚀/g, '<span style="color:#facc15;">🚀</span>')
      .replace(/💎/g, '<span style="color:#06b6d4;">💎</span>')
      .replace(/📦/g, '<span style="color:#06b6d4;">📦</span>')
      .replace(/🔹/g, '<span style="color:#facc15;">🔹</span>');
    
    return `<div style="white-space: normal;">${formatted}</div>`;
  }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    products.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'card-premium';
      card.innerHTML = `
        <div class="image-wrapper">
          <img src="${prod.gambar}" alt="${prod.nama}" onerror="this.src='https://placehold.co/600x800?text=${encodeURIComponent(prod.nama)}'">
          <div class="img-badge">${prod.badge}</div>
        </div>
        <div class="content-card">
          <div class="title">${prod.nama}</div>
          <div class="card-rating"><span class="stars">${renderStars(prod.bintang)}</span> <span class="download-count"><i class="fas fa-download"></i> ${formatDownload(prod.download)}</span></div>
          <div class="btn-group">
            <button class="btn-premium info-btn" data-id="${prod.id}"><i class="fas fa-info-circle"></i> INFO</button>
            <button class="btn-premium btn-wa order-btn" data-nama="${prod.nama}"><i class="fab fa-whatsapp"></i> ORDER VIA WA</button>
            <a href="#" class="btn-premium btn-primary-glow tutorial-btn" data-nama="${prod.nama}"><i class="fas fa-play-circle"></i> TUTORIAL</a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    document.querySelectorAll('.info-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        const product = products.find(p => p.id === id);
        if(product) {
          currentProductNama = product.nama;
          document.getElementById('modalTitle').innerHTML = `<i class="fas fa-cube"></i> ${product.nama}`;
          document.getElementById('modalBody').innerHTML = formatModalText(product.fitur);
          document.getElementById('infoModal').style.display = 'flex';
        }
      });
    });

    document.querySelectorAll('.order-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const namaProduk = btn.getAttribute('data-nama');
        const message = `Halo Kak, saya ingin ORDER produk ${namaProduk} dari KJSSTORE. Mohon info harga dan ketersediaan. Terima kasih.`;
        const encodedMsg = encodeURIComponent(message);
        const waUrl = `https://wa.me/${YOUR_WHATSAPP_NUMBER}?text=${encodedMsg}`;
        window.open(waUrl, '_blank');
      });
    });

    document.querySelectorAll('.tutorial-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const nama = btn.getAttribute('data-nama');
        const message = `Halo Kak, saya minta TUTORIAL untuk produk ${nama} dari KJSSTORE. Terima kasih.`;
        const encodedMsg = encodeURIComponent(message);
        const waUrl = `https://wa.me/${YOUR_WHATSAPP_NUMBER}?text=${encodedMsg}`;
        window.open(waUrl, '_blank');
      });
    });
  }

  // Modal handlers
  const modal = document.getElementById('infoModal');
  const closeModal = document.querySelector('.close-modal');
  
  closeModal.onclick = () => {
    modal.style.display = 'none';
  };
  
  window.onclick = (e) => { 
    if(e.target === modal) modal.style.display = 'none'; 
  };
  
  // Tombol order di dalam modal
  const modalOrderBtn = document.getElementById('modalOrderBtn');
  if(modalOrderBtn) {
    modalOrderBtn.addEventListener('click', () => {
      if(currentProductNama) {
        const message = `Halo Kak, saya ingin ORDER produk ${currentProductNama} dari KJSSTORE. Mohon info harga dan ketersediaan. Terima kasih.`;
        const encodedMsg = encodeURIComponent(message);
        const waUrl = `https://wa.me/${YOUR_WHATSAPP_NUMBER}?text=${encodedMsg}`;
        window.open(waUrl, '_blank');
      }
    });
  }

  const waFooterBtn = document.getElementById('waFooterBtn');
  if(waFooterBtn) {
    waFooterBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const msg = "Halo min, saya mau cek info daftar harga reseller dan wilayah. Terima kasih.";
      window.open(`https://wa.me/${YOUR_WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    });
  }

  renderProducts();
</script>
</body>
</html>
