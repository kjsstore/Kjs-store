  let currentProductNama = "";
  let currentProductHarga = "";

  function renderStars(rating) {
    let full = Math.floor(rating);
    let half = rating % 1 !== 0;
    let stars = '';
    for(let i=0; i<full; i++) stars += '★';
    if(half) stars += '½';
    while(stars.length < 5) stars += '☆';
    return stars;
  }

  function formatDownload(count) {
    if(typeof count === 'string') return count;
    if(count >= 1000) return (count/1000).toFixed(1) + 'k';
    return count;
  }

  function formatModalText(text) {
    let formatted = text
      .replace(/\n/g, '<br>')
      .replace(/✅/g, '<span style="color:#06b6d4;">✅</span>')
      .replace(/✔/g, '<span style="color:#facc15;">✔</span>')
      .replace(/⚠️/g, '<span style="color:#f97316;">⚠️</span>')
      .replace(/🔥/g, '<span style="color:#facc15;">🔥</span>')
      .replace(/✨/g, '<span style="color:#facc15;">✨</span>')
      .replace(/🚀/g, '<span style="color:#facc15;">🚀</span>')
      .replace(/💎/g, '<span style="color:#06b6d4;">💎</span>')
      .replace(/📦/g, '<span style="color:#06b6d4;">📦</span>')
      .replace(/🔹/g, '<span style="color:#facc15;">🔹</span>')
      .replace(/💰/g, '<span style="color:#facc15;">💰</span>');
    return `<div style="white-space: normal;">${formatted}</div>`;
  }

  function openLightbox(imgSrc) {
    const lightbox = document.getElementById('lightboxModal');
    const lightboxImg = document.getElementById('lightboxImg');
    lightboxImg.src = imgSrc;
    lightbox.style.display = 'flex';
  }

  function closeLightbox() {
    const lightbox = document.getElementById('lightboxModal');
    lightbox.style.display = 'none';
  }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    products.forEach(prod => {
      const card = document.createElement('div');
      card.className = 'card-premium';
      card.innerHTML = `
        <div class="image-wrapper" data-img="${prod.gambar}">
          <img src="${prod.gambar}" alt="${prod.nama}" onerror="this.src='https://placehold.co/400x400?text=${encodeURIComponent(prod.nama)}'">
          <div class="img-badge">${prod.badge}</div>
        </div>
        <div class="content-card">
          <div class="title">${prod.nama}</div>
          <div class="price"><i class="fas fa-tag"></i> <span>${prod.harga}</span></div>
          <div class="card-rating"><span class="stars">${renderStars(prod.bintang)}</span> <span class="download-count"><i class="fas fa-download"></i> ${formatDownload(prod.download)}</span></div>
          <div class="btn-group">
            <button class="btn-premium info-btn" data-id="${prod.id}"><i class="fas fa-info-circle"></i> CEK INFO</button>
            <button class="btn-premium btn-wa order-btn" data-nama="${prod.nama}" data-harga="${prod.harga}"><i class="fab fa-whatsapp"></i> ORDER</button>
            <a href="#" class="btn-premium btn-primary-glow tutorial-btn" data-nama="${prod.nama}"><i class="fas fa-play-circle"></i> TUTORIAL</a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    document.querySelectorAll('.image-wrapper').forEach(wrapper => {
      wrapper.addEventListener('click', (e) => {
        e.stopPropagation();
        const imgSrc = wrapper.getAttribute('data-img');
        if(imgSrc) openLightbox(imgSrc);
      });
    });

    document.querySelectorAll('.info-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        const product = products.find(p => p.id === id);
        if(product) {
          currentProductNama = product.nama;
          currentProductHarga = product.harga;
          document.getElementById('modalTitle').innerHTML = `<i class="fas fa-cube"></i> ${product.nama}`;
          document.getElementById('modalBody').innerHTML = formatModalText(product.fitur);
          document.getElementById('infoModal').style.display = 'flex';
        }
      });
    });

    document.querySelectorAll('.order-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const namaProduk = btn.getAttribute('data-nama');

        const waUrl = `https://wa.me/${YOUR_WHATSAPP_NUMBER}?text=${encodedMsg}`;
        window.open(waUrl, '_blank');
      });
    });

    document.querySelectorAll('.tutorial-btn').forEach(btn => {

    });
  }
